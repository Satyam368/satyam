<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div class="heart-container" id="heart-container"></div>

    <section class="hero">
        <div class="glass-panel">
            <h1 class="fade-in">For My Love...</h1>
            <p class="subtitle fade-in delay-1">I made something special just for you.</p>
            <div class="scroll-indicator fade-in delay-2">
                <span>Scroll Down</span>
                <div class="arrow">↓</div>
            </div>
        </div>
    </section>

    <section class="memories">
        <h2 class="section-title">Some beautiful pics of Yours.. <br> Your Smile is Pricless.. </h2>
       
        <div class="gallery">
            <div class="card">
                <img src="images/WhatsApp Image 2026-03-22 at 7.37.47 PM.jpeg" alt="Starry Night">
                
            </div>
            <div class="card">
                <img src="images/WhatsApp Image 2026-03-22 at 7.37.48 PM (1).jpeg" alt="Sunny Park">
              
            </div>
            <div class="card">
                <img src="images/WhatsApp Image 2026-03-22 at 7.37.48 PM (2).jpeg" alt="Holding Rose">
                
            </div>
            <div class="card">
                <img src="images/WhatsApp Image 2026-03-22 at 7.37.48 PM.jpeg" alt="Beautiful Moment">
                
            </div>
            <div class="card">
                <img src="images/WhatsApp Image 2026-03-22 at 7.37.49 PM (1).jpeg" alt="Happy Time">
                
            </div>
            <div class="card">
                <img src="images/WhatsApp Image 2026-03-22 at 7.37.49 PM.jpeg" alt="Perfect Day">
                
            </div>
        </div>
    </section>

    <section class="proposal">
        <div class="glass-panel text-center">
            <h2 class="question-pre">And now...</h2>
            <button id="revealBtn" class="btn">I Have a Question</button>

            <div id="secretMessage" class="hidden">
                <h1 class="big-question">Will you be my girl?</h1>
                <p class="final-note">I love you so much sneha</p>
                <div class="buttons-container">
                    <button id="yesBtn" class="btn">Yes</button>
                    <button id="noBtn" class="btn btn-no">No</button>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
